  {n:"Maternity",d:"Ensaio gestante",c:"profissional",key:"maternity"},
  {n:"Wedding",d:"Ensaios de casamento",c:"profissional",key:"wedding"},
  {n:"Family Portrait",d:"Retrato família",c:"profissional",key:"family"},
  {n:"Multi-View",d:"9 ângulos",c:"profissional",key:"multiview"},
  {n:"Lip Sync",d:"Áudio + boca",c:"profissional",key:"lipsync"},
  {n:"E-commerce",d:"Pack-shots produto",c:"profissional",key:"ecommerce"},
  {n:"Bulk Import",d:"Importar lote",c:"workflow",key:"bulk"},
  {n:"Style Learning",d:"Treinar estilo",c:"workflow",key:"stylelearn"},
  {n:"Recreate",d:"Recriar a partir de ref",c:"workflow",key:"recreate"},
  {n:"Marketing Studio",d:"Campanhas completas",c:"workflow",key:"marketing"}
];

function viewGeneric(toolKey){
  // 1. Tenta NAV (label/ícone primário); 2. ALL_TOOLS (fallback bento)
  let tool = null;
  for(const g of NAV){
    if(g.items){
      const f = g.items.find(it=>it.key===toolKey);
      if(f){ tool = {label:f.label, ico:f.ico}; break; }
    }
  }
  if(!tool){
    const t = ALL_TOOLS.find(t=>t.key===toolKey);
    if(t) tool = {label:t.n, ico:"M5 5h14v14H5z"};
  }
  if(!tool) tool = {label:toolKey.charAt(0).toUpperCase()+toolKey.slice(1), ico:"M5 5h14v14H5z"};
  return `
  <div class="head"><div><div class="eyebrow"><span class="dot"></span>FERRAMENTA</div><h1>${tool.label}</h1><p>Esta ferramenta está em construção. Volte em breve para experimentar a interface dedicada.</p></div><div class="head-actions"><button class="tool-btn primary" data-tab="all">${ICO("M3 3h7v7H3z M14 3h7v7h-7z")}Voltar pra todas</button></div></div>
  <div class="tool-page">
    <div class="panel">
      <div class="ico">${ICO(tool.ico)}</div>
      <h3>${tool.label}</h3>
      <p>Você selecionou uma ferramenta da nossa suíte completa. A interface dedicada será liberada no próximo release. Por enquanto você pode usar a ferramenta principal mais próxima ou testar nossas demos.</p>
      <div class="actions">
        <button class="tool-btn primary" data-tab="image">${ICO("M3 3h18v18H3z")}Image Studio</button>
        <button class="tool-btn" data-tab="edit">${ICO("M12 19V5")}Edit Studio</button>
        <button class="tool-btn" data-tab="all">${ICO("M3 3h7v7H3z M14 3h7v7h-7z")}Todas</button>
      </div>
    </div>
    <div class="sec-title">Outras ferramentas do mesmo grupo<span class="line"></span></div>
    <div class="quick-tools" style="grid-template-columns:repeat(6,1fr)">
      ${(NAV.find(g=>g.items&&g.items.some(it=>it.key===toolKey))?.items||[]).slice(0,6).map(it=>`<div class="quick" data-tab="${it.key}"><div class="qico">${ICO(it.ico)}</div><strong>${it.label}</strong><span>Abrir</span></div>`).join('')}
    </div>
  </div>`;
}

const VIEWS = {
  home:viewHome, image:viewImage, video:viewVideo, audio:viewAudio, edit:viewEdit,
  character:viewCharacter, marketing:viewMarketing, product:viewProduct,
  depth:viewDepth, assets:viewAssets, all:viewAll, r3d:viewR3D
};

const TAB_CONFIG = {
  home:{model:"Refine Suite",ratio:"—",placeholder:"Pergunte qualquer coisa ou descreva uma cena…",noDock:true,noRail:true},
  image:{model:"Nano-Banana Pro",ratio:"16:9",placeholder:"Persona feminina, fotografia editorial, luz natural quente, 35mm…"},
  video:{model:"Kling 3.0 Omni",ratio:"9:16",placeholder:"Travelling lateral · rua de Tóquio à noite, neon refletido na chuva…"},
  audio:{model:"Suno Studio v4",ratio:"3:1",placeholder:"Trilha lo-fi, 90 BPM, melancólica, piano + chuva ao fundo, 45s…"},
  edit:{model:"Refine Edit v2",ratio:"1:1",placeholder:"Remover poste e expandir o céu pra cima…"},
  character:{model:"Persona Trainer",ratio:"3:4",placeholder:"Persona Sofia: 28 anos, cabelos ruivos, olhar confiante…"},
  marketing:{model:"Brand Engine",ratio:"4:5",placeholder:"Post de lançamento, fundo escuro, headline ousada, CTA laranja…"},
  product:{model:"Product Engine",ratio:"1:1",placeholder:"Lata edição limitada, paisagem cartoon, hora dourada…"},
  r3d:{model:"Pixar Engine",ratio:"3:4",placeholder:"Personagem 3D estilo Pixar, fofo, olhos grandes, fur detalhado…"},
  depth:{model:"MiDaS · Marigold",ratio:"—",placeholder:"Suba imagem ou descreva. Geramos depth + normal + mask…"},
  assets:{model:"Asset Forge",ratio:"1:1",placeholder:"Cofre encantado, fundo transparente, render 3D, 4K…"},
  all:{model:"—",ratio:"—",placeholder:"Buscar ferramenta…",noDock:true,noRail:true}
};

// Edit-related tools that should open inside the Edit page (with that tool pre-selected)
const EDIT_TOOLS = {
  outpaint:"Outpaint", removeobj:"Remove Object", sketch:"Sketch to Image",
  styletransfer:"Style Transfer", replacebg:"Replace BG", expand:"Expand",
  colorize:"Colorize", faceswap:"Face Swap", clothswap:"Cloth Swap",
  hairchange:"Hair Change", expression:"Expression", agechange:"Age Change",
  twin:"Twin", skin:"Skin Enhance", bgremove:"Background Remove",
  relight:"Relight", restore:"Photo Restoration", upscale:"Upscale"
};
let activeEditTool = "Style Transfer";

function setTab(key){
  if(!key) return;
  // Route edit-related tools into Edit page with pre-selection
  if(EDIT_TOOLS[key]){
    activeEditTool = EDIT_TOOLS[key];
    key = "edit";
  } else if(key === "edit"){
    activeEditTool = "Style Transfer";
  }
  currentTab = key;
  let cfg = TAB_CONFIG[key];
  let viewFn = VIEWS[key];

  if(!viewFn){
    viewFn = ()=>viewGeneric(key);
    cfg = {model:"Refine",ratio:"—",placeholder:"Esta ferramenta usa o modelo padrão…"};
  }

  // Update crumb/model/ratio
  let label = key;
  for(const g of NAV) if(g.items){const f=g.items.find(it=>it.key===key);if(f){label=f.label;break}}
  const cn=$('crumbName');if(cn) cn.textContent = label;
  $('modelName').textContent = cfg.model;
  $('ratioVal').textContent = cfg.ratio;

  // Render view
  $('view').innerHTML = viewFn();
  $('canvas').scrollTop = 0;
  $('canvas').classList.toggle('no-dock', !!cfg.noDock);
  $('dock').classList.toggle('hidden', !!cfg.noDock);
  $('app').classList.toggle('no-rail', !!cfg.noRail);

  // Bind data-tab clicks inside view
  document.querySelectorAll('#view [data-tab]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();setTab(el.dataset.tab)});
  });
  // Helper: troca a imagem do stage + backdrop blur
  const swapStage = src => {
    const stage = $('stageImg');
    if(!stage || !src) return;
    stage.src = src;
    document.querySelector('.stage-inner')?.style.setProperty('--stage-bg', `url("${src}")`);
  };
  // Variation pills — agora trocam a imagem do stage também
  document.querySelectorAll('#view .var-pill').forEach(v=>v.addEventListener('click',()=>{
    document.querySelectorAll('#view .var-pill').forEach(x=>x.classList.remove('active'));
    v.classList.add('active');
    if(v.dataset.img) swapStage(v.dataset.img);
  }));
  document.querySelectorAll('#view .variation').forEach(vc=>vc.addEventListener('click',()=>{
    const img=vc.querySelector('img'); if(img) swapStage(img.src);
  }));
  // Style packs — clicar troca stage + active
  document.querySelectorAll('#view .style').forEach(s=>s.addEventListener('click',()=>{
    document.querySelectorAll('#view .style').forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
    if(s.dataset.img) swapStage(s.dataset.img);
  }));
  // Tool cards / cam / frame — só toggle active (escopo no #view pra não acumular)
  document.querySelectorAll('#view .tool-card').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('#view .tool-card').forEach(x=>x.classList.remove('active'));t.classList.add('active')}));
  document.querySelectorAll('#view .cam').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('#view .cam').forEach(x=>x.classList.remove('active'));c.classList.add('active')}));
  document.querySelectorAll('#view .frame').forEach(f=>f.addEventListener('click',()=>{document.querySelectorAll('#view .frame').forEach(x=>x.classList.remove('active'));f.classList.add('active')}));
  // Cards interativos sem ação ainda — feedback "Em breve" via toast
  document.querySelectorAll('#view .persona, #view .prod, #view .persona-train, #view .asset-card, #view .campaign, #view .format, #view .r3d-card, #view .r3d-preset, #view .quick-action').forEach(el=>{
    el.style.cursor='pointer';
    el.addEventListener('click',()=>showToast('Em breve · '+(el.querySelector('strong')?.textContent || el.textContent.trim().slice(0,32))));
  });
  // Active toggle pra .cat (filter visual)
  document.querySelectorAll('#view .cat').forEach(c=>c.addEventListener('click',()=>{
    document.querySelectorAll('#view .cat').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
  }));
  // Before/after slider — desktop (mouse) + mobile (touch)
  const ba = document.querySelector('.before-after');
  if(ba){
    const after=ba.querySelector('.after'),div=ba.querySelector('.ba-divider'),handle=ba.querySelector('.ba-handle');
    let drag=false;
    const setX=cx=>{const r=ba.getBoundingClientRect();const x=Math.max(0,Math.min(100,((cx-r.left)/r.width)*100));after.style.clipPath=`inset(0 0 0 ${x}%)`;div.style.left=x+'%';handle.style.left=x+'%'};
    ba.addEventListener('mousedown',e=>{drag=true;setX(e.clientX);e.preventDefault()});
    window.addEventListener('mousemove',e=>{if(drag)setX(e.clientX)});
    window.addEventListener('mouseup',()=>drag=false);
    // Touch (mobile)
    ba.addEventListener('touchstart',e=>{drag=true;if(e.touches[0])setX(e.touches[0].clientX)},{passive:true});
    window.addEventListener('touchmove',e=>{if(drag&&e.touches[0])setX(e.touches[0].clientX)},{passive:true});
    window.addEventListener('touchend',()=>drag=false);
    window.addEventListener('touchcancel',()=>drag=false);
  }
  // All-tools filter+search
  const allSearch = $('allSearch');
  if(allSearch){
    let activeCat="all";
    const filter=()=>{const q=allSearch.value.toLowerCase().trim();document.querySelectorAll('#bento .bento-tool').forEach(t=>{const c=activeCat==='all'||t.dataset.cat===activeCat;const m=!q||t.dataset.name.includes(q);t.style.display=c&&m?'':'none'})};
    allSearch.addEventListener('input',filter);
    document.querySelectorAll('#allCats .cat').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('#allCats .cat').forEach(x=>x.classList.remove('active'));c.classList.add('active');activeCat=c.dataset.cat;filter()}));
  }

  // Sync sidebar — only the exact tab key is active
  document.querySelectorAll('.sidebar .nav-item').forEach(n=>n.classList.toggle('active', n.dataset.tab===key));
  // Edit panel tool selector (escopo no #view, atualiza span dedicado)
  document.querySelectorAll('#view [data-tool]').forEach(t=>t.addEventListener('click',()=>{
    activeEditTool = t.dataset.tool;
    document.querySelectorAll('#view [data-tool]').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const eyebrowText = $('editEyebrowText');
    if(eyebrowText) eyebrowText.textContent = 'AI Edit · ' + activeEditTool;
  }));
  // Set stage backdrop blur
  const stageImg = $('stageImg');
  if(stageImg){
    const setBg=()=>document.querySelector('.stage-inner')?.style.setProperty('--stage-bg', `url("${stageImg.src}")`);
    if(stageImg.complete) setBg(); else stageImg.addEventListener('load',setBg,{once:true});
  }
  // Hover-video nos hero-tiles (toca vídeo Kling no hover, volta ao img no leave)
  document.querySelectorAll('.hero-tile[data-hover-video]').forEach(tile=>{
    const src=tile.dataset.hoverVideo;
    let vid=null;
    tile.addEventListener('mouseenter',()=>{
      if(!vid){
        vid=document.createElement('video');
        vid.src=src; vid.muted=true; vid.loop=true; vid.playsInline=true; vid.preload='metadata';
        vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transition:opacity .3s;opacity:0';
        tile.insertBefore(vid, tile.querySelector('.open'));
      }
      vid.style.opacity='1';
      vid.play().catch(()=>{});
    });
    tile.addEventListener('mouseleave',()=>{
      if(vid){ vid.style.opacity='0'; vid.pause(); }
    });
  });
  // Audio Studio — track click sincroniza UI inteira + ícone play/pause + cursor waveform
  const audioEl = $('suno-audio');
  if(audioEl){
    const playBtn = $('audioPlayBtn');
    const playIcon = $('audioPlayIcon');
    const cover = $('audioCover');
    const titleEl = $('audioTitle');
    const metaEl = $('audioMeta');
    const cursor = $('audioCursor');
    const waveform = $('audioWaveform');
    const fmtTime = s => { s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
    const PLAY_PATH  = 'M8 5v14l11-7z';
    const PAUSE_PATH = 'M6 5h4v14H6zM14 5h4v14h-4z';
    const refreshIcon = () => {
      const p = playIcon?.querySelector('path');
      if(p) p.setAttribute('d', audioEl.paused ? PLAY_PATH : PAUSE_PATH);
    };
    audioEl.addEventListener('play', refreshIcon);
    audioEl.addEventListener('pause', refreshIcon);
    audioEl.addEventListener('ended', refreshIcon);
    audioEl.addEventListener('timeupdate', () => {
      if(cursor && audioEl.duration){
        cursor.style.left = (audioEl.currentTime / audioEl.duration * 100) + '%';
      }
      if(metaEl){
        const tracker = document.querySelector('#trackList .track.active');
        const meta = tracker?.dataset.meta || '90 BPM · A minor';
        const dur = tracker?.dataset.dur || '1:48';
        metaEl.textContent = `${meta} · ${fmtTime(audioEl.currentTime)} / ${dur} · Suno v4`;
      }
    });
    if(playBtn){
      playBtn.addEventListener('click', () => {
        audioEl.paused ? audioEl.play() : audioEl.pause();
      });
    }
    // Click em waveform faz seek
    if(waveform){
      waveform.addEventListener('click', e => {
        if(!audioEl.duration) return;
        const r = waveform.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
        audioEl.currentTime = pct * audioEl.duration;
      });
    }
    // Track click — atualiza UI completa
    document.querySelectorAll('#trackList .track').forEach(tr => {
      tr.addEventListener('click', () => {
        document.querySelectorAll('#trackList .track').forEach(x => x.classList.remove('active'));
        tr.classList.add('active');
        if(tr.dataset.src) audioEl.src = tr.dataset.src;
        if(cover && tr.dataset.cover) cover.src = tr.dataset.cover;
        if(titleEl && tr.dataset.name) titleEl.textContent = `${tr.dataset.name} · ${tr.dataset.artist || 'Refine Suite'}`;
        if(metaEl && tr.dataset.meta) metaEl.textContent = `${tr.dataset.meta} · 0:00 / ${tr.dataset.dur} · Suno v4`;
        audioEl.play().catch(()=>{});
      });
    });
    refreshIcon();
  }
  // Video Stage — play/pause toggle + timeline syncada
  const videoEl = $('videoStageEl');
  if(videoEl){
    const playBtn = $('videoStagePlayBtn');
    const playIcon = $('videoStagePlayIcon');
    const progress = $('videoStageProgress');
    const current = $('videoStageCurrent');
    const dur = $('videoStageDur');
    const fmt = s => { s = s||0; const m=Math.floor(s/60); const ss=(s%60).toFixed(2).padStart(5,'0'); return String(m).padStart(2,'0')+':'+ss; };
    const PLAY  = 'M8 5v14l11-7z';
    const PAUSE = 'M6 5h4v14H6zM14 5h4v14h-4z';
    const refresh = () => {
      const p = playIcon?.querySelector('path');
      if(p) p.setAttribute('d', videoEl.paused ? PLAY : PAUSE);
    };
    videoEl.addEventListener('play', refresh);
    videoEl.addEventListener('pause', refresh);
    videoEl.addEventListener('loadedmetadata', () => { if(dur) dur.textContent = fmt(videoEl.duration); });
    videoEl.addEventListener('timeupdate', () => {
      if(progress && videoEl.duration) progress.style.width = (videoEl.currentTime / videoEl.duration * 100) + '%';
      if(current) current.textContent = fmt(videoEl.currentTime);
    });
    if(playBtn){
      playBtn.addEventListener('click', () => {
        videoEl.paused ? videoEl.play() : videoEl.pause();
      });
    }
    refresh();
  }
  if(cfg.placeholder) typewriter(cfg.placeholder);
}

let typingTimer=null;
function typewriter(text){
  const pi=$('promptInput');if(!pi)return;
  let i=0;pi.setAttribute('placeholder','');clearTimeout(typingTimer);
  const tick=()=>{pi.setAttribute('placeholder',text.slice(0,i));i++;if(i<=text.length)typingTimer=setTimeout(tick,22+Math.random()*30)};tick();
}

// HISTORY
function histCard(h,i){return `<article class="history" style="animation-delay:${i*55}ms" data-img="${h.img}" data-prompt="${h.p}"><img src="${h.img}" alt="${h.p}" loading="lazy" />${h.pin?`<span class="pin ${h.pin==='FAV'?'fav':''}">${h.pin}</span>`:''}<div class="label"><div>${h.p}</div><div class="ago">${h.t}</div></div></article>`}
function renderHistory(filter=""){
  const list=$('railList');const f=filter.toLowerCase().trim();const items=f?HISTORY.filter(h=>h.p.toLowerCase().includes(f)):HISTORY;
  if(items.length===0){list.innerHTML=`<div style="grid-column:1/-1;padding:40px 10px;text-align:center;color:var(--text-3);font-size:12.5px">Nada encontrado</div>`;return}
  if(f){list.innerHTML=items.map((h,i)=>histCard(h,i)).join('')}
  else{list.innerHTML=`<div class="rail-section">Hoje<span class="line"></span></div>${items.slice(0,4).map((h,i)=>histCard(h,i)).join('')}<div class="rail-section">Esta semana<span class="line"></span></div>${items.slice(4,9).map((h,i)=>histCard(h,i+4)).join('')}<div class="rail-section">Mais antigos<span class="line"></span></div>${items.slice(9).map((h,i)=>histCard(h,i+9)).join('')}`}
  list.querySelectorAll('.history').forEach(h=>h.addEventListener('click',()=>{const stage=$('stageImg');if(stage)stage.src=h.dataset.img;$('promptInput').value=h.dataset.prompt;showToast("Geração carregada")}));
}

function showToast(msg){const t=$('toast');$('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.remove('show'),2400)}

function generate(){const btn=$('genBtn');btn.classList.add('loading');btn.querySelector('.gen-label').textContent="Gerando…";setTimeout(()=>{btn.classList.remove('loading');btn.querySelector('.gen-label').textContent="Gerar";showToast("Geração pronta · "+(TAB_CONFIG[currentTab]?.model||"Refine"))},1600)}

// BIND
$('genBtn').addEventListener('click',generate);
$('genBtn').addEventListener('mousemove',e=>{if($('genBtn').classList.contains('loading'))return;const r=$('genBtn').getBoundingClientRect();const x=(e.clientX-r.left-r.width/2)/r.width;const y=(e.clientY-r.top-r.height/2)/r.height;$('genBtn').style.transform=`translate(${x*4}px, ${y*3}px) translateY(-1px)`});
$('genBtn').addEventListener('mouseleave',()=>$('genBtn').style.transform='');
$('promptInput').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();generate()}});
$('railTabs').querySelectorAll('.rail-tab').forEach(rt=>rt.addEventListener('click',()=>{$('railTabs').querySelectorAll('.rail-tab').forEach(b=>b.classList.remove('active'));rt.classList.add('active');moveIndicator($('railTabs'),$('railInd'),rt)}));
$('railSearchInput').addEventListener('input',e=>renderHistory(e.target.value));
window.addEventListener('resize',()=>{moveIndicator($('railTabs'),$('railInd'),document.querySelector('.rail-tab.active'))});

// Init
renderSidebar();
renderHistory();
window.addEventListener('load',()=>{
  setTab('home');
  moveIndicator($('railTabs'),$('railInd'),document.querySelector('.rail-tab.active'));
});
// CTA new button
document.querySelector('.cta-new').addEventListener('click',()=>setTab('home'));
</script>
